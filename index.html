<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bizli AI</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#0a0e1a;font-family:system-ui,-apple-system,sans-serif;color:#fff;overflow:hidden}

    /* MAIN APP */
    #app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

    /* LOGIN STATE */
    #logged-out{text-align:center;max-width:320px;width:100%}
   .logo-box{
      width:90px;
      height:90px;
      background:#000;
      border-radius:22px;
      margin:0 auto 32px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 30px rgba(0,255,209,.2)
    }
   .logo-box img{width:60px;height:60px}
    #logged-out h1{
      font-size:32px;
      margin-bottom:8px;
      font-weight:700;
      color:#8b5cf6;
      letter-spacing:-.5px
    }
    #logged-out p{
      opacity:.5;
      margin-bottom:48px;
      font-size:15px;
      color:#94a3b8
    }
   .google-btn{
      background:#1e293b;
      border:1px solid #334155;
      color:#fff;
      padding:14px 24px;
      border-radius:12px;
      font-weight:500;
      font-size:15px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:12px;
      margin:0 auto;
      transition:all.2s
    }
   .google-btn:active{transform:scale(.96);background:#334155}
   .google-btn img{width:20px;height:20px}

    /* LOGGED IN STATE */
    #logged-in{display:none;flex:1;width:100%;padding:20px}
   .header{padding:16px 0 24px;border-bottom:1px solid #1e293b}
   .header h1{font-size:20px;font-weight:600}
   .header p{opacity:.5;font-size:13px;margin-top:4px;color:#94a3b8}
   .chat-placeholder{flex:1;display:flex;align-items:center;justify-content:center;opacity:.3;text-align:center}
  </style>
</head>
<body>
  <!-- MAIN APP - NO SPLASH -->
  <div id="app">
    <!-- LOGGED OUT VIEW -->
    <div id="logged-out">
      <div class="logo-box">
        <img src="./icon-192.png" alt="Bizli AI">
      </div>
      <h1>Bizli AI</h1>
      <p>Your personal AI assistant</p>
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>
    </div>

    <!-- LOGGED IN VIEW -->
    <div id="logged-in">
      <div class="header">
        <h1 id="welcome-text">Hello, Papa</h1>
        <p>Signed in</p>
      </div>
      <div class="chat-placeholder">
        <div>
          <p style="font-size:18px;margin-bottom:8px">Chat interface</p>
          <p style="font-size:14px">Coming next...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // YOUR BIZLI AI FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyA5iGhmCZvTzLciazkqMQjZAYuuyIMfCdo",
      authDomain: "bizliai.firebaseapp.com",
      projectId: "bizliai",
      storageBucket: "bizliai.firebasestorage.app",
      messagingSenderId: "845713499043",
      appId: "1:845713499043:web:f61ec2f76cc2808eefb016"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Auth state listener
    auth.onAuthStateChanged((user) => {
      if (user) {
        const name = user.displayName || user.email.split('@')[0] || 'Papa';
        onLoginSuccess(name);
      } else {
        showLoginScreen();
      }
    });

    function showLoginScreen(){
      document.getElementById('logged-out').style.display='block';
      document.getElementById('logged-in').style.display='none';
    }

    function onLoginSuccess(name){
      document.getElementById('logged-out').style.display='none';
      document.getElementById('logged-in').style.display='block';
      document.getElementById('welcome-text').innerText=`Hello, ${name}`;
    }

    function signInWithGoogle(){
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err=>{
        alert('Login failed: ' + err.message);
      });
    }
  </script>
</body>
</html>
