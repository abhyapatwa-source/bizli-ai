<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Bizli AI</title>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#000;font-family:system-ui,-apple-system,sans-serif;color:#fff;overflow:hidden}
    
    /* SPLASH SCREEN */
    #splash{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity.6s ease-out}
    #splash.hide{opacity:0;pointer-events:none}
 .splash-logo{
    width:110px;
    height:110px;
    background: transparent!important;
    mix-blend-mode: screen;
    animation:logoZoom 2.2s cubic-bezier(.2,.8,.2,1) forwards
  }
    @keyframes logoZoom{
      0%{transform:scale(.4) rotate(-10deg);opacity:0;filter:blur(4px)}
      40%{transform:scale(1.15) rotate(5deg);opacity:1;filter:blur(0)}
      70%{transform:scale(.95) rotate(0deg)}
      100%{transform:scale(1) rotate(0deg)}
    }
    
    /* MAIN APP */
    #app{opacity:0;transition:opacity.8s ease-in;min-height:100vh;padding:20px;display:flex;flex-direction:column}
    #app.show{opacity:1}
    
    /* LOGIN STATE */
    #logged-out{text-align:center;margin:auto}
    #logged-out h1{font-size:28px;margin-bottom:12px;font-weight:700}
    #logged-out p{opacity:.6;margin-bottom:32px;font-size:15px}
 .login-btn{background:#00ff88;color:#000;border:none;padding:14px 28px;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;transition:transform.1s}
 .login-btn:active{transform:scale(.96)}
    
    /* LOGGED IN STATE */
    #logged-in{display:none;flex:1}
 .header{padding:16px 0 24px;border-bottom:1px solid #1a1a1a}
 .header h1{font-size:20px;font-weight:600}
 .header p{opacity:.5;font-size:13px;margin-top:4px}
 .chat-placeholder{flex:1;display:flex;align-items:center;justify-content:center;opacity:.3;text-align:center}
  </style>
</head>
<body>
  <!-- ANIMATED SPLASH -->
  <div id="splash">
    <img src="/splash-logo.png" class="splash-logo" alt="Bizli AI">
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <!-- LOGGED OUT VIEW -->
    <div id="logged-out">
      <h1>Bizli AI</h1>
      <p>Your personal AI assistant</p>
      <button class="login-btn" onclick="signInWithGoogle()">Continue with Google</button>
    </div>
    
    <!-- LOGGED IN VIEW -->
    <div id="logged-in">
      <div class="header">
        <h1 id="welcome-text">Hello, Papa</h1>
        <p>Signed in</p>
      </div>
      <div class="chat-placeholder">
        <div>
          <p style="font-size:18px;margin-bottom:8px">Chat interface</p>
          <p style="font-size:14px">Coming next...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // YOUR BIZLI AI FIREBASE CONFIG - ALREADY INSERTED
    const firebaseConfig = {
      apiKey: "AIzaSyA5iGhmCZvTzLciazkqMQjZAYuuyIMfCdo",
      authDomain: "bizliai.firebaseapp.com",
      projectId: "bizliai",
      storageBucket: "bizliai.firebasestorage.app",
      messagingSenderId: "845713499043",
      appId: "1:845713499043:web:f61ec2f76cc2808eefb016"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    // Splash timing: minimum 2.2s for animation
    let splashDone = false;
    setTimeout(()=>{splashDone = true; checkAndShowApp();}, 2200);
    
    // Auth state listener
    auth.onAuthStateChanged((user) => {
      if (user) {
        const name = user.displayName || user.email.split('@')[0] || 'Papa';
        onLoginSuccess(name);
      } else {
        showLoginScreen();
      }
      checkAndShowApp();
    });
    
    function checkAndShowApp(){
      if(splashDone){
        document.getElementById('splash').classList.add('hide');
        document.getElementById('app').classList.add('show');
        setTimeout(()=>document.getElementById('splash').remove(), 600);
      }
    }
    
    function showLoginScreen(){
      document.getElementById('logged-out').style.display='block';
      document.getElementById('logged-in').style.display='none';
    }
    
    function onLoginSuccess(name){
      document.getElementById('logged-out').style.display='none';
      document.getElementById('logged-in').style.display='block';
      document.getElementById('welcome-text').innerText=`Hello, ${name}`;
    }
    
    function signInWithGoogle(){
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err=>{
        alert('Login failed: ' + err.message);
      });
    }
  </script>
</body>
</html>
