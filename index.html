<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizli AI</title>
    <meta name="theme-color" content="#0B141A">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: #0B141A;
            color: #E9EDF0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
       .app { display: none; flex-direction: column; height: 100vh; }
       .app.active { display: flex; }
       .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
       .login-screen.hidden { display: none; }
       .login-box { width: 100%; max-width: 400px; text-align: center; }
       .logo { width: 80px; height: 80px; margin: 0 auto 24px; border-radius: 20px; background: #000; }
       .logo img { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #A855F7 0%, #8B5CF6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
       .subtitle { color: #8696A0; font-size: 16px; margin-bottom: 32px; }
       .auth-btn { width: 100%; padding: 14px 24px; background: #202C33; border: 1px solid #2A3942; border-radius: 12px; color: #E9EDF0; font-size: 16px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; margin-bottom: 12px; }
       .auth-btn:hover { background: #2A3942; }
       .auth-btn img { width: 20px; height: 20px; }

       .header { padding: 12px 16px; background: #202C33; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2A3942; }
       .header h2 { font-size: 18px; flex: 1; }
       .header.status { font-size: 12px; color: #4ADE80; }
       .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
       .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
       .msg.user { background: #005C4B; align-self: flex-end; border-bottom-right-radius: 2px; }
       .msg.bizli { background: #202C33; align-self: flex-start; border-bottom-left-radius: 2px; }
       .msg.time { font-size: 11px; color: #8696A0; margin-top: 4px; text-align: right; }
       .input-area { padding: 8px 16px 16px; background: #0B141A; }
       .input-wrap { display: flex; gap: 8px; background: #202C33; border-radius: 24px; padding: 8px 8px 8px 16px; }
       .input-wrap input { flex: 1; background: none; border: none; color: #E9EDF0; font-size: 16px; outline: none; }
       .input-wrap button { width: 40px; height: 40px; border-radius: 50%; background: #00A884; border: none; color: #FFF; cursor: pointer; display: flex; align-items: center; justify-content: center; }
       .input-wrap button:disabled { background: #2A3942; cursor: not-allowed; }
       .error-banner { background: #F87171; color: #FFF; padding: 8px 16px; text-align: center; font-size: 14px; display: none; }
       .error-banner.show { display: block; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <div class="logo"><img src="https://i.imgur.com/placeholder.png" alt="Bizli"></div>
            <h1>Bizli AI</h1>
            <p class="subtitle">Your personal AI assistant</p>
            <button class="auth-btn" id="googleBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>
        </div>
    </div>

    <div id="app" class="app">
        <div class="error-banner" id="errorBanner"></div>
        <div class="header">
            <h2>Bizli AI</h2>
            <span class="status" id="status">Online</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="messageInput" placeholder="Message" />
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const WORKER_URL = 'https://bizli-brain.abhyapatwa.workers.dev/';

        const firebaseConfig = {
          apiKey: "AIzaSyA5iGhmCZvTzLciazkqMQjZAYuuyIMfCdo",
          authDomain: "bizliai.firebaseapp.com",
          projectId: "bizliai",
          storageBucket: "bizliai.firebasestorage.app",
          messagingSenderId: "845713499043",
          appId: "1:845713499043:web:f61ec2f76cc2808eefb016"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('loginScreen');
        const appScreen = document.getElementById('app');
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const errorBanner = document.getElementById('errorBanner');
        const statusEl = document.getElementById('status');

        let currentUser = null;
        let chatHistory = [];

        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                loginScreen.classList.add('hidden');
                appScreen.classList.add('active');
                addMessage('bizli', `Hi ${user.displayName || 'Papa'}! I'm ready 🩵`);
            } else {
                loginScreen.classList.remove('hidden');
                appScreen.classList.remove('active');
            }
        });

        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.add('show');
            setTimeout(() => errorBanner.classList.remove('show'), 5000);
        }

        function addMessage(role, text) {
            const msg = document.createElement('div');
            msg.className = `msg ${role}`;
            const time = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            msg.innerHTML = `${text}<div class="time">${time}</div>`;
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            inputEl.value = '';
            sendBtn.disabled = true;
            statusEl.textContent = 'Typing...';

            addMessage('user', text);
            chatHistory.push({ role: 'user', parts: [{ text }] });

            const bizliMsg = document.createElement('div');
            bizliMsg.className = 'msg bizli';
            bizliMsg.textContent = '...';
            messagesEl.appendChild(bizliMsg);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            try {
                const token = await currentUser.getIdToken();
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ contents: chatHistory })
                });

                if (!res.ok) throw new Error(`Worker error: ${res.status}`);

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                bizliMsg.textContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.text) {
                                    fullText += data.text;
                                    bizliMsg.textContent = fullText;
                                    messagesEl.scrollTop = messagesEl.scrollHeight;
                                }
                            } catch {}
                        }
                    }
                }

                if (!fullText) fullText = 'Sorry, I got no response 🩵';
                bizliMsg.innerHTML = `${fullText}<div class="time">${new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</div>`;
                chatHistory.push({ role: 'bizli', parts: [{ text: fullText }] });

            } catch (e) {
                console.error(e);
                bizliMsg.innerHTML = `Papa... Cannot reach Worker. Check Cloudflare deployment.<div class="time">${new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</div>`;
                showError(e.message);
            }

            sendBtn.disabled = false;
            statusEl.textContent = 'Online';
        }

        sendBtn.onclick = sendMessage;
        inputEl.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
