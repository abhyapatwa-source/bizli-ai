<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bizli AI</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon-192.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    html, body { 
      margin: 0; padding: 0; height: 100%; 
      background: #1a1a2e; /* FIXES WHITE FLASH */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #eee; overflow: hidden;
    }
    .splash {
      position: fixed; inset: 0; background: #1a1a2e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.8s ease-out;
    }
    .splash.hide { opacity: 0; pointer-events: none; }
    .logo {
      width: 100px; height: 100px; margin-bottom: 20px;
      /* REMOVED background: #0f3460; - THIS WAS THE BLACK BOX */
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 0 30px rgba(167, 139, 250, 0.6)); /* GLOW IS BACK */
    }
    .logo img { width: 80px; height: 80px; }
    .splash h1 { font-size: 1.8rem; font-weight: 400; }
    .login-wrap {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #1a1a2e; opacity: 0; transition: opacity 0.8s ease-in;
    }
    .login-wrap.show { opacity: 1; }
    .login-box { text-align: center; padding: 40px; }
    .login-box .logo { margin: 0 auto 20px; }
    .login-box h1 { font-size: 2rem; margin-bottom: 8px; color: #a78bfa; }
    .login-box p { opacity: 0.7; margin-bottom: 40px; }
    #g_id_signin { margin: 10px auto; width: 280px; }
    .footer {
      position: absolute; bottom: 20px; width: 100%; 
      text-align: center; font-size: 12px; opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="logo"><img src="./icon-192.png" alt="Bizli"></div>
    <h1>Bizli AI</h1>
  </div>

  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <div class="logo"><img src="./icon-192.png" alt="Bizli"></div>
      <h1>Bizli AI</h1>
      <p>Your personal AI assistant</p>
      <div id="g_id_onload"
        data-client_id="28657620909-g4mt4h78cra132qikokoh71orvkv1f6v.apps.googleusercontent.com"
        data-context="signin" data-ux_mode="popup"
        data-callback="handleCredentialResponse" data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-text="continue_with" data-shape="pill" data-width="280"></div>
    </div>
    <div class="footer">Developed by Abhya</div>
  </div>

  <script type="module">
    import { saveToken, getToken } from './assets/js/utils.js';
    
    // FIX LOGIN LOOP: If already logged in, skip to app
    if (getToken()) {
      window.location.href = './app.html';
    } else {
      setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
        document.getElementById('loginWrap').classList.add('show');
      }, 2500);
    }

    window.handleCredentialResponse = (response) => {
      saveToken(response.credential);
      window.location.href = './app.html';
    }
  </script>
</body>
</html>
