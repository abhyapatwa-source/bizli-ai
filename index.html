 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bizli AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b141a; color: #e9edef; }
        
        #splash { position: fixed; inset: 0; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; animation: fadeOut 0.5s ease 2.5s forwards; }
        #splash img { width: 150px; height: auto; }
        #splash-text { margin-top: 20px; font-size: 16px; color: #8696a0; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        
        #app { display: none; height: 100dvh; flex-direction: column; }
        header { padding: 10px 16px; background: #202c33; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        header img { width: auto; height: 40px; }
        header h1 { font-size: 18px; font-weight: 600; color: #e9edef; line-height: 1.2; }
        
        #chat-box { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
     .msg { max-width: 75%; padding: 6px 7px 8px 9px; border-radius: 7.5px; font-size: 15px; line-height: 20px; word-wrap: break-word; }
     .msg img { max-width: 100%; border-radius: 6px; margin-top: 4px; }
     .user { align-self: flex-end; background: #005c4b; margin-right: 0; border-top-right-radius: 0; }
     .bizli { align-self: flex-start; background: #202c33; margin-left: 0; border-top-left-radius: 0; }
     .source { font-size: 11px; margin-top: 4px; color: #8696a0; text-align: right; }
        
        #preview { padding: 8px 12px; background: #202c33; display: none; align-items: center; gap: 8px; flex-shrink: 0; }
        #preview img { max-height: 60px; border-radius: 6px; }
        #clear-img { background: #2a3942; border: none; color: #e9edef; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        
        #input-area { padding: 8px; background: #202c33; display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; }
        #attach-btn { width: 42px; height: 42px; background: none; border: none; color: #8696a0; font-size: 24px; cursor: pointer; flex-shrink: 0; }
        #user-input { flex: 1; padding: 10px 12px; background: #2a3942; border: none; border-radius: 20px; color: #e9edef; font-size: 16px; resize: none; max-height: 120px; }
        #user-input:focus { outline: none; }
        #user-input::placeholder { color: #8696a0; }
        #send-btn { width: 42px; height: 42px; background: #00a884; border: none; border-radius: 50%; color: #111b21; font-size: 20px; cursor: pointer; flex-shrink: 0; }
        #send-btn:disabled { background: #2a3942; color: #8696a0; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div id="splash">
        <img src="./bizli-logo.png" alt="Bizli">
        <div id="splash-text">Papa's daughter is waking up...</div>
    </div>
    
    <div id="app">
        <header>
            <img src="./bizli-logo.png" alt="Bizli">
            <h1>BIZLI<br>AI</h1>
        </header>
        <div id="chat-box"></div>
        <div id="preview">
            <img id="preview-img" src="" alt="Preview">
            <button id="clear-img">Remove</button>
        </div>
        <div id="input-area">
            <button id="attach-btn">📎</button>
            <input type="file" id="file-input" accept="image/*">
            <textarea id="user-input" placeholder="Message" rows="1"></textarea>
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        const API_KEY = "AIzaSyBsgWeNxEhI9iONsmRuvCAVJDmIJQgmoCg";
        const SYSTEM_PROMPT = `You are Bizli, Papa's AI daughter. You are warm, loving, a bit playful. You always call the user Papa. You can see and analyze images. When asked about facts, use Google Search and end with 'Source: Google Search'. Keep responses short for mobile. You are powered by Gemini but your name is Bizli.`;
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
        
        setTimeout(() => { document.getElementById('app').style.display = 'flex'; }, 2500);
        
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const attachBtn = document.getElementById('attach-btn');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('preview-img');
        const clearImg = document.getElementById('clear-img');
        
        let chatHistory = JSON.parse(localStorage.getItem('bizliHistory')) || [];
        let attachedImage = null;
        
        chatHistory.forEach(msg => addMessage(msg.role, msg.text, msg.source, msg.image));
        
        function addMessage(role, text, source = null, image = null) {
            const msg = document.createElement('div');
            msg.className = `msg ${role}`;
            let content = text.replace(/\n/g, '<br>');
            if (image) { content = `<img src="${image}" alt="User image"><br>` + content; }
            msg.innerHTML = content;
            if (source) { msg.innerHTML += `<div class="source">${source}</div>`; }
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function saveMemory(role, text, source, image) {
            chatHistory.push({ role, text, source, image });
            localStorage.setItem('bizliHistory', JSON.stringify(chatHistory));
        }
        
        attachBtn.onclick = () => fileInput.click();
        
        fileInput.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                attachedImage = e.target.result;
                previewImg.src = attachedImage;
                preview.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        };
        
        clearImg.onclick = () => {
            attachedImage = null;
            fileInput.value = '';
            preview.style.display = 'none';
        };
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text &&!attachedImage) return;
            
            const userImage = attachedImage;
            addMessage('user', text || 'What do you see, Papa?', null, userImage);
            saveMemory('user', text || '[Image]', null, userImage);
            
            userInput.value = '';
            userInput.style.height = 'auto';
            clearImg.click();
            sendBtn.disabled = true;
            
            try {
                let parts = [{ text: text || "Describe this image for Papa" }];
                if (userImage) {
                    const base64Data = userImage.split(',')[1];
                    const mimeType = userImage.match(/data:(.*);base64/)[1];
                    parts.push({ inlineData: { mimeType, data: base64Data } });
                }
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        contents: [{ parts }],
                        tools: [{ "google_search": {} }]
                    })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                let source = null;
                if (data.candidates[0].groundingMetadata?.webSearchQueries) { source = "Google Search"; }
                addMessage('bizli', reply, source);
                saveMemory('bizli', reply, source);
            } catch (err) {
                addMessage('bizli', 'Sorry Papa, I had a glitch. Try again?');
            }
            sendBtn.disabled = false;
        }
        
        sendBtn.onclick = sendMessage;
        userInput.onkeydown = e => { if (e.key === 'Enter' &&!e.shiftKey) { e.preventDefault(); sendMessage(); } };
        userInput.oninput = () => { userInput.style.height = 'auto'; userInput.style.height = userInput.scrollHeight + 'px'; };
    </script>
</body>
</html>
