<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bizli AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg, #1a1a2e); color: var(--text, #eee); height: 100vh;
      display: flex; overflow: hidden;
    }
    :root {
      --bg: #1a1a2e; --sidebar: #16213e; --text: #eee; --accent: #0f3460; --bubble-user: #e94560; --bubble-ai: #533483;
    }
    [data-theme="light"] {
      --bg: #f5f5f5; --sidebar: #fff; --text: #111; --accent: #667eea; --bubble-user: #667eea; --bubble-ai: #e0e0e0;
    }
   .sidebar {
      width: 260px; background: var(--sidebar); padding: 15px; display: flex; flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
   .main { flex: 1; display: flex; flex-direction: column; }
   .header {
      padding: 15px 20px; background: var(--accent); display: flex; justify-content: space-between; align-items: center;
    }
   .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
   .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; line-height: 1.5; word-wrap: break-word; }
   .user { background: var(--bubble-user); align-self: flex-end; border-bottom-right-radius: 4px; }
   .ai { background: var(--bubble-ai); align-self: flex-start; border-bottom-left-radius: 4px; }
   .typing { opacity: 0.7; font-style: italic; }
   .input-area {
      padding: 15px; background: var(--sidebar); display: flex; gap: 10px;
    }
    input { flex: 1; padding: 12px; border: none; border-radius: 25px; background: var(--bg); color: var(--text); outline: none; }
    button { padding: 12px 20px; border: none; border-radius: 25px; background: var(--accent); color: #fff; cursor: pointer; }
   .new-chat { width: 100%; margin-bottom: 15px; }
   .menu { position: relative; }
   .dropdown {
      position: absolute; right: 0; top: 40px; background: var(--sidebar);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; display: none; z-index: 10;
    }
   .dropdown.show { display: block; }
   .dropdown button { width: 100%; text-align: left; border-radius: 0; background: transparent; }
   .dropdown button:hover { background: var(--accent); }
    @media (max-width: 768px) {.sidebar { position: absolute; left: -260px; transition: 0.3s; z-index: 20; height: 100%; }.sidebar.open { left: 0; } }
  </style>
</head>
<body data-theme="dark">
  <div class="sidebar" id="sidebar">
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <div id="history"></div>
  </div>
  <div class="main">
    <div class="header">
      <button onclick="toggleSidebar()" style="background:none;font-size:20px;">☰</button>
      <h2>Bizli AI 🩵</h2>
      <div class="menu">
        <button onclick="toggleMenu()">⋮</button>
        <div class="dropdown" id="menu">
          <button onclick="toggleTheme()">Toggle Theme</button>
          <button onclick="logout()">Logout</button>
        </div>
      </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <input id="msgInput" placeholder="Message Bizli..." onkeypress="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

<script>
const WORKER_URL = 'https://bizli-brain.abhyapatwa.workers.dev/';
const token = localStorage.getItem('bizli_token');
if (!token) window.location.href = '/';

let history = JSON.parse(localStorage.getItem('bizli_history') || '[]');
let currentChat = [];

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function toggleMenu() { document.getElementById('menu').classList.toggle('show'); }
function toggleTheme() {
  const t = document.body.dataset.theme === 'dark'? 'light' : 'dark';
  document.body.dataset.theme = t;
  localStorage.setItem('bizli_theme', t);
  toggleMenu();
}
function logout() {
  localStorage.removeItem('bizli_token');
  window.location.href = '/';
}
document.body.dataset.theme = localStorage.getItem('bizli_theme') || 'dark';

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  div.textContent = text;
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop = 1e9;
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  currentChat.push({ role: 'user', parts: [{ text }] });

  // Typing delay: 3-6s based on length
  const delay = text.length < 5? 3000 : 6000;
  const typing = document.createElement('div');
  typing.className = 'msg ai typing';
  typing.textContent = 'Bizli is typing...';
  document.getElementById('chatBox').appendChild(typing);

  setTimeout(async () => {
    typing.remove();
    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg ai';
    document.getElementById('chatBox').appendChild(aiDiv);

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ contents: currentChat })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (let line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            fullText += data.text;
            aiDiv.textContent = fullText;
            document.getElementById('chatBox').scrollTop = 1e9;
          } catch {}
        }
      }
    }
    currentChat.push({ role: 'model', parts: [{ text: fullText }] });
    saveHistory();
  }, delay);
}

function newChat() {
  if (currentChat.length) history.unshift({ id: Date.now(), title: currentChat[0].parts[0].text.slice(0,30), msgs: currentChat });
  currentChat = [];
  document.getElementById('chatBox').innerHTML = '';
  saveHistory();
  renderHistory();
}

function saveHistory() {
  localStorage.setItem('bizli_history', JSON.stringify(history));
}

function renderHistory() {
  const div = document.getElementById('history');
  div.innerHTML = history.map(h => `<button onclick="loadChat(${h.id})" style="width:100%;text-align:left;margin:5px 0;padding:8px;border:none;background:var(--accent);color:#fff;border-radius:8px;">${h.title}</button>`).join('');
}

function loadChat(id) {
  const chat = history.find(h => h.id === id);
  if (!chat) return;
  currentChat = chat.msgs;
  document.getElementById('chatBox').innerHTML = '';
  currentChat.forEach(m => addMsg(m.parts[0].text, m.role === 'user'? 'user' : 'ai'));
  if (window.innerWidth < 768) toggleSidebar();
}

renderHistory();
</script>
</body>
</html>
